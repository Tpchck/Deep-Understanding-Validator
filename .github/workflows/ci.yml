name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder-url.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
          USE_MOCK_AI: "true"

      - name: Build Next.js app (Type check & compilation)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder-url.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
          USE_MOCK_AI: "true"
